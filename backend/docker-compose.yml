version: '3.8'

services:
  backend:
    build: .
    container_name: sportstv_backend
    restart: always
    ports:
      - "80:8000"
    volumes:
      # Mount the database directory so data persists across restarts and rebuilds
      - ./db:/app/db
    environment:
      - DATABASE_URL=sqlite:///./db/sports_tv.db

