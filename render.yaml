services:
  - type: web
    name: sports-tv-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install chromium && playwright install-deps chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sports-tv-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: sports-tv-db
    plan: free
